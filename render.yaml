services:
  - type: web
    name: java-project-99
    runtime: java
    plan: free
    buildCommand: ./gradlew bootJar -x test
    startCommand: java -jar app/build/libs/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: postgres-db
          property: connectionString
    healthCheckPath: /actuator/health

databases:
  - name: postgres-db
    plan: free